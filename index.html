<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qibla Compass v9.0 - Audit Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --green-glow: #00FF00;
            --orange-glow: #FF8C00;
            --red-glow: #FF0000;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* PREMIUM DIRECTION BOX (KOTAK TENGAH) */
        #direction-box {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            border-radius: 15px;
            background-color: var(--green-glow);
            color: #000000;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        /* COMPASS VISUAL AREA */
        .compass-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #needle {
            width: 100%;
            height: 100%;
            transition: transform 0.2s ease-out; /* Smooth rotation v8.1 */
        }

        /* 4-GRID DIAGNOSTICS (LED PANEL KAT BAWAH) */
        .diagnostic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 20px;
        }

        .led-button {
            background-color: var(--panel-color);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px 5px;
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .led-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #555;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* LED STATUS COLORS */
        .led-green { background-color: var(--green-glow); box-shadow: 0 0 10px var(--green-glow); color: #fff; }
        .led-orange { background-color: var(--orange-glow); box-shadow: 0 0 10px var(--orange-glow); color: #fff; }
        .led-red { background-color: var(--red-glow); box-shadow: 0 0 10px var(--red-glow); color: #fff; }
        .active-text { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="direction-box">FINDING QIBLAH...</div>

    <div class="compass-container">
        <svg id="needle" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" stroke="#333" stroke-width="2" fill="none" />
            <text x="93" y="25" fill="#555" font-size="12" font-weight="bold">N</text>
            <polygon points="100,20 115,70 100,60 85,70" fill="#00FF00" />
            <line x1="100" y1="60" x2="100" y2="150" stroke="#00FF00" stroke-width="3" />
            <circle cx="100" cy="100" r="8" fill="#fff" />
        </svg>
    </div>

    <div class="diagnostic-grid">
        <div class="led-button" id="btn-gps">
            <div class="led-dot id-led" id="led-gps"></div>
            <span>GPS</span>
        </div>
        <div class="led-button" id="btn-sensor">
            <div class="led-dot id-led" id="led-sensor"></div>
            <span>SENSOR</span>
        </div>
        <div class="led-button" id="btn-qibla">
            <div class="led-dot id-led" id="led-qibla"></div>
            <span>QIBLA</span>
        </div>
        <div class="led-button" id="btn-accuracy">
            <div class="led-dot id-led" id="led-accuracy"></div>
            <span>ACCURACY</span>
        </div>
    </div>

<script>
    // =========================================================================
    // INSURANCE CONFIGURATION (Suis Orang Belakang Tabir)
    // =========================================================================
    const ENABLE_AUDIT_DEPT = true; // Tukar false untuk bunuh Dept Audit & patah balik ke v8.1 mutlak

    // UI Elements Caching
    const directionBox = document.getElementById('direction-box');
    const needle = document.getElementById('needle');
    const ledSensor = document.getElementById('led-sensor');
    const txtSensor = document.getElementById('btn-sensor');

    // State Fail-safe untuk Simpan Data Lama (Guna untuk banding tersekat/stuck)
    let lastHeading = 0;
    let stuckCounter = 0;

    // SIMULASI DATA TARGET KIBLAT (Batu Caves, Malaysia ~292°)
    const QIBLA_DIRECTION = 292; 

    // =========================================================================
    // DEPARTMENT 1: MAIN COMPASS ENGINE (STRICT BENCHMARK v8.1)
    // =========================================================================
    function initCompass() {
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', handleCompassLogic, true);
            // Fallback jika android lama tak support absolute
            window.addEventListener('deviceorientation', handleCompassLogic, true);
        } else {
            alert("Your device doesn't support orientation sensors.");
        }
    }

    function handleCompassLogic(event) {
        // Logik dapatkan darjah dari webkit atau alpha standard
        let alpha = event.alpha;
        if (event.webkitCompassHeading) {
            alpha = event.webkitCompassHeading;
        }

        if (alpha === null) return;

        // Formula Pusingan Jarum v8.1 (Suci & Bersih)
        let currentHeading = Math.round(alpha);
        let needleRotation = (QIBLA_DIRECTION - currentHeading);
        
        // Pusingkan jarum SVG
        needle.style.transform = `rotate(${needleRotation}deg)`;

        // Simpan data mentah untuk dibaca oleh Department Audit secara pasif
        let mockSensorData = {
            heading: currentHeading,
            uT: event.beta ? Math.abs(event.beta * 1.5) + 30 : 45, // Simulasi data magnet mentah untuk testing browser
            isFlat: (Math.abs(event.beta) < 15 && Math.abs(event.gamma) < 15), // Jika phone condong lebih 15 darjah = Tilted
            isMoving: Math.abs(lastHeading - currentHeading) > 1,
            isStuck: checkIsStuck(currentHeading)
        };

        lastHeading = currentHeading;

        // Hantar ke Department Audit untuk semakan UI
        runAuditDepartment(mockSensorData);
    }

    // =========================================================================
    // DEPARTMENT 2: PASSIVE AUDIT & ANOMALY DETECTOR (NEW DEPT - v9.0)
    // =========================================================================
    function runAuditDepartment(sensorData) {
        // Jaminan Insurans: Jika false, kekalkan UI asal v8.1 tanpa gangguan
        if (!ENABLE_AUDIT_DEPT) {
            directionBox.style.backgroundColor = '#00FF00';
            directionBox.style.boxShadow = '0 4px 15px rgba(0, 255, 0, 0.2)';
            directionBox.innerText = 'MINIMUM v8.1 BYPASS MODE';
            updateSensorLED('GREEN');
            return;
        }

        // -----------------------------------------------------------------
        // AUDIT 1: Absolute Tilt Verification (Masalah Kes Nenek Senget)
        // -----------------------------------------------------------------
        if (!sensorData.isFlat) {
            directionBox.style.backgroundColor = '#FF8C00'; // Oren
            directionBox.style.boxShadow = '0 4px 15px rgba(255, 140, 0, 0.4)';
            directionBox.innerText = '⚠️ PHONE TILTED: PLACE FLAT ⚠️';
            updateSensorLED('ORANGE');
            return;
        }

        // -----------------------------------------------------------------
        // AUDIT 2: Metal / Iron Anomaly Detection (Besi Kacau)
        // -----------------------------------------------------------------
        if (sensorData.uT > 80 && !sensorData.isMoving) {
            directionBox.style.backgroundColor = '#FF0000'; // Merah
            directionBox.style.boxShadow = '0 4px 15px rgba(255, 0, 0, 0.4)';
            directionBox.innerText = '🧲 METAL DETECTED: MOVE 3 STEPS AWAY 🧲';
            updateSensorLED('RED');
            return;
        }

        // -----------------------------------------------------------------
        // AUDIT 3: Frozen Magnetometer Detection (Compass Stuck)
        // -----------------------------------------------------------------
        if (sensorData.isStuck) {
            directionBox.style.backgroundColor = '#FF0000'; // Merah Kelip
            directionBox.style.boxShadow = '0 4px 15px rgba(255, 0, 0, 0.4)';
            directionBox.innerText = '🔄 COMPASS STUCK: WAVE PHONE IN 8-SHAPE 🔄';
            updateSensorLED('RED');
            return;
        }

        // -----------------------------------------------------------------
        // DEFAULT STATE: Semua Audit Lulus (Penambahbaikan v9.0 Dinamik)
        // -----------------------------------------------------------------
        directionBox.style.backgroundColor = '#00FF00';
        directionBox.style.boxShadow = '0 4px 15px rgba(0, 255, 0, 0.2)';
        
        // Kira beza darjah antara kedudukan semasa dengan arah Kiblat
        let degreeDifference = Math.abs(sensorData.heading - QIBLA_DIRECTION);
        
        // Sembuh dinamik jika dalam julat ralat ±3 darjah
        if (degreeDifference <= 3 || degreeDifference >= 357) {
            directionBox.innerText = '🤲 QIBLAH ALIGNED 🤲';
        } else {
            directionBox.innerText = `🧭 HEADING: ${sensorData.heading}° (QIBLA: ${QIBLA_DIRECTION}°)`;
        }
        
        updateSensorLED('GREEN');
    }

    // UTILITY HELPER: Logik semak jika chip kompas beku/stuck
    function checkIsStuck(currentHeading) {
        if (currentHeading === lastHeading && currentHeading !== 0) {
            stuckCounter++;
        } else {
            stuckCounter = 0;
        }
        // Jika bacaan darjah tak berubah langsung selama 50 kitaran sensor (lebih kurang 3-5 saat)
        return (stuckCounter > 50);
    }

    // UTILITY HELPER: Tukar warna LED Grid SENSOR kat bawah seiring dengan kotak atas
    function updateSensorLED(color) {
        ledSensor.className = 'led-dot id-led'; // reset
        txtSensor.className = 'led-button';     // reset
        
        if (color === 'GREEN') {
            ledSensor.classList.add('led-green');
            txtSensor.classList.add('active-text');
        } else if (color === 'ORANGE') {
            ledSensor.classList.add('led-orange');
            txtSensor.classList.add('active-text');
        } else if (color === 'RED') {
            ledSensor.classList.add('led-red');
            txtSensor.classList.add('active-text');
        }
    }

    // Hidupkan Sistem v9.0 Utama bila halaman sedia
    window.onload = () => {
        initCompass();
        // Set awal LED lain sebagai status standby hijau demi estetik v8.1
        document.getElementById('led-gps').classList.add('led-green');
        document.getElementById('led-qibla').classList.add('led-green');
        document.getElementById('led-accuracy').classList.add('led-green');
    };
</script>

</body>
</html>
