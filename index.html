<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaabah Finder - UIA v9.0</title>
    <style>
        :root {
            --primary-color: #1b4d3e;
            --secondary-color: #c5a059;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --success: #2e7d32;
            --error: #c62828;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--secondary-color);
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Status LEDs */
        .status-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #222;
        }

        .status-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: #555;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .led.active {
            background-color: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .led.error {
            background-color: var(--error);
            box-shadow: 0 0 8px var(--error);
        }

        /* Compass Visual */
        .compass-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .compass-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--secondary-color);
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        .compass-ticks {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.1s ease-out;
        }

        .direction-label {
            position: absolute;
            font-weight: bold;
            font-size: 16px;
            color: var(--text-muted);
        }

        .label-n { top: 12px; left: 50%; transform: translateX(-50%); color: var(--error); }
        .label-s { bottom: 12px; left: 50%; transform: translateX(-50%); }
        .label-e { right: 12px; top: 50%; transform: translateY(-50%); }
        .label-w { left: 12px; top: 50%; transform: translateY(-50%); }

        .qibla-pointer {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 40px solid var(--secondary-color);
            top: 25px;
            left: calc(50% - 15px);
            filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.6));
            display: none;
        }

        .center-hub {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .overlay-status {
            position: absolute;
            text-align: center;
            z-index: 5;
            background: rgba(18, 18, 18, 0.85);
            padding: 15px;
            border-radius: 12px;
            width: 85%;
            border: 1px solid #333;
        }

        /* Readout Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a2a;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-card p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .metric-card h2 {
            font-size: 18px;
            color: var(--text-main);
        }

        .metric-card h2.highlight {
            color: var(--secondary-color);
        }

        /* Controls */
        .control-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--secondary-color);
            color: #000;
        }

        .btn-primary:hover {
            background: #b38f48;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>KAABAH FINDER</h1>
            <p>UNIVERSAL INTEGRATED AUDIT V9.0</p>
        </header>

        <div class="status-panel">
            <div class="status-item">
                <div id="led-gps" class="led"></div> GPS
            </div>
            <div class="status-item">
                <div id="led-sensor" class="led"></div> SENSOR
            </div>
            <div class="status-item">
                <div id="led-audit" class="led"></div> AUDIT BYPASS
            </div>
        </div>

        <div class="compass-wrapper">
            <div id="needle-plate" class="compass-dial">
                <div class="direction-label label-n">N</div>
                <div class="direction-label label-s">S</div>
                <div class="direction-label label-e">E</div>
                <div class="direction-label label-w">W</div>
                <div id="qibla-marker" class="qibla-pointer"></div>
            </div>
            <div class="center-hub"></div>

            <div id="status-overlay" class="overlay-status">
                <p id="status-text" style="font-weight: bold; font-size: 14px;">SYSTEM READY</p>
                <p id="status-subtext" style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Sila tekan butang mula di bawah.</p>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <p>Heading Semasa</p>
                <h2 id="txt-heading">---°</h2>
            </div>
            <div class="metric-card">
                <p>Sudut Kiblat</p>
                <h2 id="txt-bearing" class="highlight">---°</h2>
            </div>
            <div class="metric-card">
                <p>Lokasi Semasa</p>
                <h2 id="txt-location" style="font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">---</h2>
            </div>
            <div class="metric-card">
                <p>Jarak ke Kaabah</p>
                <h2 id="txt-distance">--- km</h2>
            </div>
        </div>

        <div class="control-btns">
            <button id="btn-start" class="btn btn-primary" onclick="initApp()">Start Finder</button>
            <button id="btn-refresh" class="btn btn-secondary hidden" onclick="refreshSensors()">Refresh Sensors</button>
        </div>
    </div>

    <script>
        // GLOBAL ENGINE CONFIGURATIONS & CORE CONSTANTS (v8.1 Core + v9.0 Sync)
        const KAABAH_COORDS = { lat: 21.422522, lng: 39.826122 };
        const ENABLE_AUDIT_DEPT = false; // ENGINE KILL SWITCH: Memintas penungguan subsistem audit yang tergantung.

        // Real-time Runtime States
        let currentHeading = null;
        let qiblaBearing = null;
        let userLocation = null;
        let isAppRunning = false;

        // DOM Element Cache
        const dom = {
            ledGps: document.getElementById('led-gps'),
            ledSensor: document.getElementById('led-sensor'),
            ledAudit: document.getElementById('led-audit'),
            needlePlate: document.getElementById('needle-plate'),
            qiblaMarker: document.getElementById('qibla-marker'),
            statusOverlay: document.getElementById('status-overlay'),
            statusText: document.getElementById('status-text'),
            statusSubtext: document.getElementById('status-subtext'),
            txtHeading: document.getElementById('txt-heading'),
            txtBearing: document.getElementById('txt-bearing'),
            txtLocation: document.getElementById('txt-location'),
            txtDistance: document.getElementById('txt-distance'),
            btnStart: document.getElementById('btn-start'),
            btnRefresh: document.getElementById('btn-refresh')
        };

        /**
         * 3. SENSOR & GPS INITIALIZATION FLOW (V9.0 FIX)
         * Dicetuskan serentak melalui 'direct user interaction' untuk mengelakkan sekatan keselamatan pelayar web.
         */
        async function initApp() {
            dom.statusText.innerText = "CONNECTING GPS & SENSORS...";
            dom.statusSubtext.innerText = "Sila berikan kebenaran akses sekiranya diminta.";
            
            // Set status awal LED Kill Switch Engine
            if (!ENABLE_AUDIT_DEPT) {
                dom.ledAudit.classList.add('active');
            }

            // A. mulakan Kebenaran Orientasi Peranti (iOS / Android Asynchronous Bypass)
            let sensorGranted = false;
            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    sensorGranted = (permission === 'granted');
                } else {
                    // Untuk pelayar web android/desktop biasa yang tidak memerlukan requestPermission eksplisit
                    sensorGranted = true;
                }
            } catch (err) {
                console.error("Ralat kebenaran sensor:", err);
                sensorGranted = false;
            }

            // B. Jalankan Geolocation serentak bersama kebenaran sensor
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        handleGpsSuccess(position);
                        if (sensorGranted) {
                            startOrientationListener();
                        } else {
                            handleSensorFailure("Akses orientasi dinafikan.");
                        }
                    },
                    (error) => {
                        handleGpsFailure(error);
                        // Tetap cuba jalankan sensor arah jika sekadar GPS gagal fungsi sementara
                        if (sensorGranted) startOrientationListener();
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                handleGpsFailure({ message: "Geolarian tidak disokong oleh pelayar web." });
            }

            // Kemas kini paparan butang kawalan UI
            dom.btnStart.classList.add('hidden');
            dom.btnRefresh.classList.remove('hidden');
            dom.btnRefresh.innerText = "Refresh Sensors";
            dom.btnRefresh.disabled = false;
            isAppRunning = true;
        }

        /**
         * Pemprosesan Data Lokasi & Reverse-Geocode Simulasi (Batu Caves Default)
         */
        function handleGpsSuccess(position) {
            dom.ledGps.classList.remove('error');
            dom.ledGps.classList.add('active');

            userLocation = {
                lat: position.coords.coords ? position.coords.coords.latitude : position.coords.latitude,
                lng: position.coords.coords ? position.coords.coords.longitude : position.coords.longitude
            };

            // Hitung Bearing dan Jarak ke Kaabah menggunakan Core Logic v8.1
            qiblaBearing = calculateQiblaBearing(userLocation.lat, userLocation.lng);
            const distance = calculateDistance(userLocation.lat, userLocation.lng, KAABAH_COORDS.lat, KAABAH_COORDS.lng);

            // Data Persistence Update UI
            dom.txtBearing.innerText = Math.round(qiblaBearing) + "°";
            dom.txtDistance.innerText = Math.round(distance).toLocaleString() + " km";
            
            // Hardcoded "Batu Caves" seiring kehendak spesifikasi penukaran nama lokasi reverse-geocode
            dom.txtLocation.innerText = "Batu Caves, MY";
            dom.qiblaMarker.style.display = "block";

            evaluateSystemReady();
        }

        function handleGpsFailure(err) {
            console.error("GPS Error:", err);
            dom.ledGps.classList.add('error');
            dom.txtLocation.innerText = "Batu Caves (Est)";
            
            // Fallback default koordinat ke Batu Caves demi kelangsungan persistence data jika GPS disekat
            userLocation = { lat: 3.2374, lng: 101.6839 }; 
            qiblaBearing = calculateQiblaBearing(userLocation.lat, userLocation.lng);
            const distance = calculateDistance(userLocation.lat, userLocation.lng, KAABAH_COORDS.lat, KAABAH_COORDS.lng);
            
            dom.txtBearing.innerText = Math.round(qiblaBearing) + "°";
            dom.txtDistance.innerText = Math.round(distance).toLocaleString() + " km";
            dom.qiblaMarker.style.display = "block";
            
            evaluateSystemReady();
        }

        /**
         * Pendaftaran Event Listener Sensor Orientasi
         */
        function startOrientationListener() {
            // Semak event terbaik mengikut kesesuaian pelayar web (iOS vs Android webkit)
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else if ('ondeviceorientation' in window) {
                window.addEventListener('deviceorientation', handleOrientation, true);
            } else {
                handleSensorFailure("Tiada sensor hardware dikesan.");
                return;
            }
            dom.ledSensor.classList.remove('error');
            dom.ledSensor.classList.add('active');
            evaluateSystemReady();
        }

        function handleSensorFailure(msg) {
            console.warn(msg);
            dom.ledSensor.classList.add('error');
            dom.statusText.innerText = "SENSOR ERROR";
            dom.statusSubtext.innerText = "Arah kompas tidak disokong pada peranti ini.";
        }

        /**
         * EVALUATE STATUS OVERLAY HIDING MECHANISM
         */
        function evaluateSystemReady() {
            if ((dom.ledGps.classList.contains('active') || userLocation) && dom.ledSensor.classList.contains('active')) {
                dom.statusOverlay.classList.add('hidden');
            }
        }

        /**
         * 2. THE FREEZE BUG RESOLUTION (handleOrientation Complete Logic)
         * Mengira sudut pusingan dial plate dan mengemaskini UI secara real-time tanpa terputus.
         */
        function handleOrientation(event) {
            // Ambil data heading berdasarkan ketersediaan parameter pelayar web (Alpha / WebkitHeading)
            let heading = event.alpha;
            
            if (event.webkitCompassHeading !== undefined) {
                heading = event.webkitCompassHeading; // Untuk peranti iOS Safari
            } else if (event.absolute === true || event.alpha !== null) {
                // Untuk Android, nilai alpha adalah berlawanan arah jam, tukar ke arah jam (360 - alpha)
                heading = 360 - event.alpha;
            }

            if (heading === null || heading === undefined) return;

            currentHeading = heading;
            dom.txtHeading.innerText = Math.round(currentHeading) + "°";

            // KIRA PUSINGAN UNTUK DIAL COMPASS (#needle-plate)
            // Dial plate perlu dipusingkan secara negatif (-heading) supaya Utara sentiasa menunjuk ke Utara sebenar bumi.
            const dialRotation = -currentHeading;
            dom.needlePlate.style.transform = `rotate(${dialRotation}deg)`;

            // SINKRONISASI ARTIFAK PENANDA KIBLAT
            // Penanda kiblat diletakkan di dalam plat yang berpusing, kedudukannya adalah berdasarkan sudut bearing kiblat relatif terhadap piring kompas.
            if (qiblaBearing !== null) {
                dom.qiblaMarker.style.transform = `rotate(${qiblaBearing}deg)`;
                
                // Berikan petunjuk visual ringkas jika peranti lurus menghala tepat ke arah kiblat (Toleransi +-3 darjah)
                const diff = Math.abs((currentHeading - qiblaBearing + 360) % 360);
                if (diff < 3 || diff > 357) {
                    dom.needlePlate.style.borderColor = "#4caf50";
                } else {
                    dom.needlePlate.style.borderColor = "var(--secondary-color)";
                }
            }
        }

        /**
         * 4. REFRESH STUCK FIX
         * Memanggil semula initApp() secara telus bagi memulakan semula rantaian pengesahan kebenaran peranti.
         */
        function refreshSensors() {
            dom.btnRefresh.innerText = "REFRESHING SENSORS...";
            dom.btnRefresh.disabled = true;
            
            // Reset status visual
            dom.ledGps.classList.remove('active', 'error');
            dom.ledSensor.classList.remove('active', 'error');
            dom.statusOverlay.classList.remove('hidden');
            
            // Panggil semula permulaan aplikasi v9.0
            initApp();
        }

        /**
         * MATH CORE LOGIC (v8.1 Mathematical Formulations)
         */
        function calculateQiblaBearing(lat, lng) {
            // Penukaran darjah kepada Radian
            const phi1 = lat * Math.PI / 180;
            const lambda1 = lng * Math.PI / 180;
            const phi2 = KAABAH_COORDS.lat * Math.PI / 180;
            const lambda2 = KAABAH_COORDS.lng * Math.PI / 180;

            const dLng = lambda2 - lambda1;

            const y = Math.sin(dLng);
            const x = Math.cos(phi1) * Math.tan(phi2) - Math.sin(phi1) * Math.cos(dLng);
            
            let bearing = Math.atan2(y, x);
            bearing = bearing * 180 / Math.PI;
            bearing = (bearing + 360) % 360;

            return bearing;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Jejari bumi dalam KM
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
    </script>
</body>
</html>
